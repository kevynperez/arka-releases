name: Build Linux

# Trigger manual desde:
#   gh workflow run build-linux.yml -f tag=v1.2.7 --repo kevynperez/arka-releases
#
# Builda Arka para Linux x86_64 SOLO en formato `.deb` (Debian/Ubuntu).
# El AppImage está deshabilitado a propósito: pesaba ~78 MB porque empaca
# WebKitGTK + GTK + libsoup completos. El `.deb` pesa ~10 MB porque declara
# `libwebkit2gtk-4.1-0` como dependencia y `apt` la resuelve del sistema.
#
# Trade-off: los clientes Linux instalan manualmente con `sudo dpkg -i ...`
# o `sudo apt install ./arka.deb` y NO reciben auto-update. Para auto-update
# tendrían que usar el AppImage; cuando aparezca un cliente que lo justifique,
# reactivar la opción agregando `appimage,updater` a `--bundles` y descomentar
# el merge de `latest.json`.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a buildear (ej. v1.2.7) — debe existir ya en kevynperez/Arka"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Tauri build (linux-x86_64, .deb only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private Arka source at tag
        uses: actions/checkout@v4
        with:
          repository: kevynperez/Arka
          token: ${{ secrets.ARKA_PRIVATE_REPO_PAT }}
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config

      - name: Install node deps
        run: npm ci

      - name: Tauri build (.deb solamente)
        env:
          ARKA_LICENSE_SECRET: ${{ secrets.ARKA_LICENSE_SECRET }}
          # Tauri exige la privada porque tauri.conf.json declara la pubkey
          # del updater. Igualmente firma el .deb (no usamos el .sig en
          # latest.json — el .deb queda solo para descarga manual).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles deb

      - name: Locate .deb artifact
        id: art
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          DEB=$(find "$BUNDLE/deb" -maxdepth 1 -name '*.deb' | head -1 || true)
          if [[ -z "$DEB" ]] || [[ ! -f "$DEB" ]]; then
            echo "❌ No encontré .deb en $BUNDLE/deb" >&2
            find "$BUNDLE" -maxdepth 3 -type f >&2 || true
            exit 1
          fi
          echo "deb=$DEB" >> "$GITHUB_OUTPUT"
          echo "deb_name=$(basename "$DEB")" >> "$GITHUB_OUTPUT"

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          REPO="${{ github.repository }}"
          gh release upload "$TAG" "${{ steps.art.outputs.deb }}" --repo "$REPO" --clobber
          echo "✅ ${{ steps.art.outputs.deb_name }} subido al release $TAG"
          echo "ℹ️  No se merge entry en latest.json: el .deb no soporta auto-update."
          echo "    Los clientes Linux instalan manualmente con:"
          echo "      sudo apt install ./${{ steps.art.outputs.deb_name }}"
