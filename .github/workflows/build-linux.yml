name: Build Linux

# Trigger manual desde:
#   gh workflow run build-linux.yml -f tag=v1.2.7 --repo kevynperez/arka-releases
# o desde la UI (Actions → Build Linux → Run workflow).
#
# Builda Arka para Linux x86_64 (.AppImage) a partir del tag indicado del repo
# privado kevynperez/Arka, firma el AppImage con la llave del updater, y
# mergea la entry linux-x86_64 en el release de este repo.
#
# Asume que el tag ya existe en kevynperez/Arka.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a buildear (ej. v1.2.7) — debe existir ya en kevynperez/Arka"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Tauri build (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private Arka source at tag
        uses: actions/checkout@v4
        with:
          repository: kevynperez/Arka
          token: ${{ secrets.ARKA_PRIVATE_REPO_PAT }}
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config

      - name: Install node deps
        run: npm ci

      - name: Tauri build (firmado)
        env:
          ARKA_LICENSE_SECRET: ${{ secrets.ARKA_LICENSE_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build --target x86_64-unknown-linux-gnu --bundles appimage,deb,updater

      - name: Locate artifacts
        id: art
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"

          # AppImage updater artifact: Tauri v2 produce .AppImage.tar.gz + .sig
          APPIMAGE_TARGZ=$(find "$BUNDLE/appimage" -maxdepth 1 -name '*.AppImage.tar.gz' | head -1 || true)
          APPIMAGE_SIG="${APPIMAGE_TARGZ}.sig"

          # AppImage para descarga manual (el binario suelto)
          APPIMAGE=$(find "$BUNDLE/appimage" -maxdepth 1 -name '*.AppImage' ! -name '*.AppImage.tar.gz' ! -name '*.sig' | head -1 || true)

          # .deb para distros Debian/Ubuntu
          DEB=$(find "$BUNDLE/deb" -maxdepth 1 -name '*.deb' | head -1 || true)

          if [[ -z "$APPIMAGE_TARGZ" ]] || [[ ! -f "$APPIMAGE_SIG" ]]; then
            echo "❌ No encontré $APPIMAGE_TARGZ o su .sig" >&2
            echo "Contenido del bundle:" >&2
            find "$BUNDLE" -maxdepth 3 -type f >&2 || true
            exit 1
          fi

          {
            echo "appimage_targz=$APPIMAGE_TARGZ"
            echo "appimage_targz_name=$(basename "$APPIMAGE_TARGZ")"
            echo "appimage_sig=$APPIMAGE_SIG"
            echo "appimage=$APPIMAGE"
            echo "deb=$DEB"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Linux assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          REPO="${{ github.repository }}"
          gh release upload "$TAG" "${{ steps.art.outputs.appimage_targz }}" --repo "$REPO" --clobber
          gh release upload "$TAG" "${{ steps.art.outputs.appimage_sig }}" --repo "$REPO" --clobber
          if [[ -n "${{ steps.art.outputs.appimage }}" ]]; then
            gh release upload "$TAG" "${{ steps.art.outputs.appimage }}" --repo "$REPO" --clobber
          fi
          if [[ -n "${{ steps.art.outputs.deb }}" ]]; then
            gh release upload "$TAG" "${{ steps.art.outputs.deb }}" --repo "$REPO" --clobber
          fi

      - name: Merge linux entry into latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          APPIMAGE_NAME="${{ steps.art.outputs.appimage_targz_name }}"
          SIG=$(cat "${{ steps.art.outputs.appimage_sig }}")
          SIG="${SIG//$'\n'/}"

          MANIFEST_DIR="$RUNNER_TEMP/manifest"
          mkdir -p "$MANIFEST_DIR"
          MANIFEST_PATH="$MANIFEST_DIR/latest.json"

          if gh release download "$TAG" --repo "$REPO" --pattern "latest.json" --dir "$MANIFEST_DIR" --clobber 2>/dev/null; then
            EXISTING=$(cat "$MANIFEST_PATH")
          else
            EXISTING="{\"version\":\"$VERSION\",\"notes\":\"Arka $TAG\",\"pub_date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"platforms\":{}}"
          fi

          # Merge la entry linux-x86_64 preservando el resto
          URL="https://github.com/$REPO/releases/download/$TAG/$APPIMAGE_NAME"
          MERGED=$(echo "$EXISTING" | jq --arg url "$URL" --arg sig "$SIG" \
            '.platforms["linux-x86_64"] = {url: $url, signature: $sig}')

          echo "$MERGED" > "$MANIFEST_PATH"
          gh release upload "$TAG" "$MANIFEST_PATH" --repo "$REPO" --clobber
          echo "✅ latest.json actualizado con linux-x86_64"
